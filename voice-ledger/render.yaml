services:
  - type: web
    name: voice-ledger
    runtime: python
    plan: free                        # Free tier — sleeps after 15min inactivity
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      # ── FREE AI (Groq) — get key at console.groq.com ──────────────────────
      - key: GROQ_API_KEY
        sync: false                   # set manually in Render dashboard

      # ── Paid AI (OpenAI) — leave blank if using Groq ──────────────────────
      - key: OPENAI_API_KEY
        value: ""

      # ── Groq model config ──────────────────────────────────────────────────
      - key: GROQ_LLM_MODEL
        value: llama-3.1-70b-versatile
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3

      # ── Storage ───────────────────────────────────────────────────────────
      - key: DATABASE_URL
        value: sqlite:///./voice_ledger.db
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: MLFLOW_TRACKING_URI
        value: ./mlruns
